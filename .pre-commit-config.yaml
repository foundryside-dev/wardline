repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: wardline-scan
        name: wardline scan
        entry: wardline scan
        language: system
        types: [python]
        pass_filenames: false

