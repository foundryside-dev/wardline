name: Corpus Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  corpus-verify:
    name: Corpus Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"
      - name: Run corpus verification
        run: uv run wardline corpus verify --json > corpus-results.json
      - name: Upload corpus results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: corpus-results
          path: corpus-results.json
          retention-days: 30
