# Build the wardline Astro site (site/) and deploy to GitHub Pages.
#
# The site deploys to wardline.foundryside.dev (CNAME in site/public/CNAME,
# copied verbatim into the build output). It consumes the shared @weft/site-kit,
# which lives in a SUBDIRECTORY of a DIFFERENT repo (foundryside-dev/weft).
# npm cannot install a git subdirectory as a file: dep directly, so the build
# sparse-fetches packages/site-kit into site/vendor/site-kit first
# (scripts/fetch-site-kit.mjs), then `npm install` resolves the file: dep and
# `astro build` compiles it. The fetch also runs as a preinstall hook, but the
# explicit step keeps the order legible.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# GitHub Pages deploy permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        # Pin the Pages source to GitHub Actions (build_type=workflow); enables
        # Pages if needed. Without this, deploy-pages fails when the repo is
        # still set to "Deploy from a branch".
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch @weft/site-kit
        # Sparse-fetch packages/site-kit from the weft hub into vendor/site-kit
        # so the file: dep resolves. (preinstall runs this too; explicit here.)
        run: npm run fetch-site-kit

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        # prebuild hook copies @weft/site-kit/assets into public/_site-kit.
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
