name: Performance Benchmark

on:
  schedule:
    - cron: "0 2 * * 0"  # Sunday 2am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Scanner & Test Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Benchmark wardline scan
        id: scan
        run: |
          START=$(date +%s%N)
          uv run wardline scan src/ --manifest wardline.yaml -o scan-results.sarif 2>&1 | tee scan-output.txt
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "scan_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"

          # Extract finding count from SARIF
          FINDING_COUNT=$(python3 -c "
          import json, sys
          with open('scan-results.sarif') as f:
              sarif = json.load(f)
          total = sum(len(run.get('results', [])) for run in sarif.get('runs', []))
          print(total)
          " 2>/dev/null || echo "unknown")
          echo "finding_count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"

      - name: Benchmark test suite
        id: tests
        run: |
          START=$(date +%s%N)
          uv run pytest -m "not integration and not network" --tb=short -q 2>&1 | tee test-output.txt
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "test_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"

      - name: Generate benchmark report
        run: |
          cat <<EOF > benchmark-report.json
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "scan": {
              "duration_ms": ${{ steps.scan.outputs.scan_ms }},
              "finding_count": ${{ steps.scan.outputs.finding_count }}
            },
            "tests": {
              "duration_ms": ${{ steps.tests.outputs.test_ms }}
            }
          }
          EOF
          echo "=== Benchmark Report ==="
          cat benchmark-report.json
          echo ""
          echo "Scan:  ${{ steps.scan.outputs.scan_ms }}ms (${{ steps.scan.outputs.finding_count }} findings)"
          echo "Tests: ${{ steps.tests.outputs.test_ms }}ms"

      - name: Check performance thresholds
        run: |
          SCAN_MS=${{ steps.scan.outputs.scan_ms }}
          TEST_MS=${{ steps.tests.outputs.test_ms }}
          FAILED=0

          if [ "$SCAN_MS" -gt 60000 ]; then
            echo "::error::Scan took ${SCAN_MS}ms, exceeds 60s threshold"
            FAILED=1
          fi

          if [ "$TEST_MS" -gt 120000 ]; then
            echo "::error::Tests took ${TEST_MS}ms, exceeds 120s threshold"
            FAILED=1
          fi

          exit $FAILED

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          retention-days: 90
          path: |
            benchmark-report.json
            scan-output.txt
            test-output.txt
            scan-results.sarif
