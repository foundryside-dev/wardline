site_name: Wardline
site_description: Generic semantic-tainting static analyzer for Python
site_url: https://foundryside-dev.github.io/wardline/
repo_url: https://github.com/foundryside-dev/wardline
repo_name: foundryside-dev/wardline
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

exclude_docs: |
  superpowers/
  integration/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Taint & trust model: concepts/model.md
      - Rules: concepts/rules.md
  - Guides:
      - Configuration: guides/configuration.md
      - Suppressing findings: guides/suppression.md
      - LLM triage judge: guides/judge.md
      - Loom integration: guides/loom.md
  - Using Wardline with your coding agent: agents.md
  - Reference:
      - CLI: reference/cli.md
      - Trust vocabulary: reference/vocabulary.md
  - About:
      - Changelog: https://github.com/foundryside-dev/wardline/blob/main/CHANGELOG.md
      - Contributing: https://github.com/foundryside-dev/wardline/blob/main/CONTRIBUTING.md
      - License: https://github.com/foundryside-dev/wardline/blob/main/LICENSE
