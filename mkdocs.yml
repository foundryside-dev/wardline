site_name: Wardline
site_description: Generic semantic-tainting static analyzer for Python
site_url: https://wardline.foundryside.dev
repo_url: https://github.com/foundryside-dev/wardline
repo_name: foundryside-dev/wardline
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    # Dark-first: slate is listed first, so it is the default scheme.
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  # Bundled JetBrains Mono + Space Grotesk (vendored in stylesheets/fonts/ via
  # weft-mkdocs.css) own typography now — disable Material's Google Fonts.
  font: false
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

extra_css:
  # Shared Weft Federation docs theme (vendored) first, Wardline identity layer
  # on top.
  - stylesheets/weft-mkdocs.css
  - stylesheets/extra.css

exclude_docs: |
  superpowers/
  integration/
  bitbucket/
  notes/
  decisions/
  audits/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Taint & trust model: concepts/model.md
      - Taint algebra: concepts/taint-algebra.md
      - Rules: concepts/rules.md
      - Trust-vocabulary convergence: concepts/trust-vocabulary-convergence.md
  - Guides:
      - Configuration: guides/configuration.md
      - Suppressing findings: guides/suppression.md
      - LLM triage judge: guides/judge.md
      - Weft integration: guides/weft.md
      - Signed scan handoff to legis: guides/legis-handoff.md
      - Loomweave taint store: guides/loomweave-taint-store.md
      - Assurance posture: guides/assurance-posture.md
      - Attestation: guides/attestation.md
      - Using Wardline with your coding agent: guides/agents.md
  - Reference:
      - CLI: reference/cli.md
      - Trust vocabulary: reference/vocabulary.md
  - About:
      - Changelog: https://github.com/foundryside-dev/wardline/blob/main/CHANGELOG.md
      - Contributing: https://github.com/foundryside-dev/wardline/blob/main/CONTRIBUTING.md
      - License: https://github.com/foundryside-dev/wardline/blob/main/LICENSE
